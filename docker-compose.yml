version: '3.9'

services:
  # ── MySQL ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: todo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_pass
      MYSQL_DATABASE: todo_db
      MYSQL_USER: todo_user
      MYSQL_PASSWORD: todo_secure_pass
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - todo_network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot_secure_pass']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── API ────────────────────────────────────────────────
  api:
    build:
      context: .
      target: production
    container_name: todo_api
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    networks:
      - todo_network
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local

networks:
  todo_network:
    driver: bridge
